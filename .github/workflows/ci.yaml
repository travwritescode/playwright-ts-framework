name: E2E

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  repository_dispatch:
    types: [regression-trigger]
  schedule:
    - cron: '0 2 * * *'

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout playwright-ts-framework
        uses: actions/checkout@v4

      - name: Checkout flowstate-api
        uses: actions/checkout@v4
        with:
          repository: travwritescode/flowstate-api
          path: flowstate-api

      - name: Checkout flowstate-ui
        uses: actions/checkout@v4
        with:
          repository: travwritescode/flowstate-ui
          path: flowstate-ui

      # ── API ────────────────────────────────────────────────────────────────

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: flowstate-api/requirements.txt

      - name: Install API dependencies
        run: pip install -r flowstate-api/requirements.txt

      - name: Configure API env
        working-directory: flowstate-api
        run: |
          cp .env.example .env
          SECRET=$(openssl rand -hex 32)
          sed -i "s/^SECRET_KEY=.*/SECRET_KEY=$SECRET/" .env

      - name: Apply migrations
        working-directory: flowstate-api
        run: alembic upgrade head

      - name: Start API
        working-directory: flowstate-api
        run: |
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 \
            > /tmp/uvicorn.log 2>&1 &
          echo $! > /tmp/uvicorn.pid

      - name: Wait for API /health
        run: |
          for _ in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/health | grep -q '"status"'; then
              exit 0
            fi
            sleep 1
          done
          echo "--- uvicorn log ---" && cat /tmp/uvicorn.log || true
          exit 1

      # ── UI ────────────────────────────────────────────────────────────────

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            flowstate-ui/package-lock.json

      - name: Install UI dependencies
        working-directory: flowstate-ui
        run: npm ci

      - name: Start UI
        working-directory: flowstate-ui
        run: nohup npm run dev > /tmp/vite.log 2>&1 &

      - name: Wait for UI
        run: |
          for _ in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "--- vite log ---" && cat /tmp/vite.log || true
          exit 1

      # ── Playwright ────────────────────────────────────────────────────────

      - name: Install Playwright dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        if: github.event_name == 'pull_request'
        run: npm run test:smoke

      - name: Run regression tests
        if: github.event_name != 'pull_request'
        run: npm run test:regression

      # ── Cleanup / artefacts ───────────────────────────────────────────────

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/uvicorn.pid ]; then
            kill "$(cat /tmp/uvicorn.pid)" 2>/dev/null || true
          fi